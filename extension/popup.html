<!DOCTYPE html>
<html lang="sk">
<head>
  <meta charset="UTF-8"/>
  <title>PhishGuard</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600&family=IBM+Plex+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg:       #0b0d10;
      --surface:  #111418;
      --surface2: #181c22;
      --border:   #22282f;
      --accent:   #00d68f;
      --accent2:  #00a36e;
      --danger:   #ff3d5a;
      --danger2:  #cc2040;
      --warn:     #ffb830;
      --text:     #dde3ec;
      --muted:    #4a5260;
      --muted2:   #6b7585;
      --mono:     'IBM Plex Mono', monospace;
      --sans:     'IBM Plex Sans', sans-serif;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      width: 380px;
      background: var(--bg);
      color: var(--text);
      font-family: var(--sans);
      font-size: 13px;
      overflow: hidden;
    }

    /* ── Top bar ── */
    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 16px 10px;
      border-bottom: 1px solid var(--border);
      background: var(--surface);
    }
    .brand {
      display: flex;
      align-items: center;
      gap: 9px;
    }
    .shield {
      width: 26px; height: 26px;
      flex-shrink: 0;
    }
    .brand-name {
      font-family: var(--mono);
      font-size: 13px;
      font-weight: 600;
      letter-spacing: 0.08em;
      color: var(--accent);
    }
    .brand-name span { color: var(--muted2); font-weight: 400; }
    .status-dot {
      width: 7px; height: 7px;
      border-radius: 50%;
      background: var(--accent);
      box-shadow: 0 0 6px var(--accent);
      animation: pulse 2.4s ease-in-out infinite;
    }
    @keyframes pulse {
      0%,100% { opacity: 1; }
      50%      { opacity: 0.4; }
    }

    /* ── Body ── */
    .body { padding: 16px; }

    /* ── URL input ── */
    .input-label {
      font-family: var(--mono);
      font-size: 10px;
      letter-spacing: 0.12em;
      color: var(--muted2);
      text-transform: uppercase;
      margin-bottom: 6px;
    }
    .input-row {
      display: flex;
      gap: 8px;
      margin-bottom: 14px;
    }
    .url-input {
      flex: 1;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 9px 12px;
      color: var(--text);
      font-family: var(--mono);
      font-size: 11px;
      outline: none;
      transition: border-color 0.15s;
      min-width: 0;
    }
    .url-input::placeholder { color: var(--muted); }
    .url-input:focus { border-color: var(--accent); }

    .btn {
      flex-shrink: 0;
      padding: 9px 14px;
      background: var(--accent);
      color: #050705;
      border: none;
      border-radius: 6px;
      font-family: var(--mono);
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.06em;
      cursor: pointer;
      transition: background 0.15s, transform 0.1s;
      white-space: nowrap;
    }
    .btn:hover  { background: #00f0a0; }
    .btn:active { transform: scale(0.97); }
    .btn:disabled { background: var(--muted); color: var(--bg); cursor: not-allowed; }

    /* ── Loader ── */
    .loader {
      display: none;
      align-items: center;
      gap: 10px;
      padding: 10px 0 4px;
      color: var(--muted2);
      font-family: var(--mono);
      font-size: 11px;
    }
    .loader.on { display: flex; }
    .bar-loader {
      flex: 1;
      height: 2px;
      background: var(--border);
      border-radius: 1px;
      overflow: hidden;
    }
    .bar-inner {
      height: 100%;
      width: 40%;
      background: var(--accent);
      border-radius: 1px;
      animation: slide 1.1s ease-in-out infinite;
    }
    @keyframes slide {
      0%   { transform: translateX(-100%); }
      100% { transform: translateX(350%); }
    }

    /* ── Error ── */
    .error {
      display: none;
      background: rgba(255,61,90,0.08);
      border: 1px solid var(--danger2);
      border-radius: 6px;
      padding: 9px 12px;
      font-size: 12px;
      color: var(--danger);
      margin-bottom: 12px;
      font-family: var(--mono);
    }
    .error.on { display: block; }

    /* ── Verdict card ── */
    .card {
      display: none;
      border-radius: 8px;
      border: 1px solid;
      overflow: hidden;
      margin-bottom: 14px;
    }
    .card.on  { display: block; }
    .card.ok  { border-color: var(--accent2); }
    .card.bad { border-color: var(--danger2); }

    .card-top {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px 14px;
    }
    .card.ok  .card-top { background: rgba(0,214,143,0.07); }
    .card.bad .card-top { background: rgba(255,61,90,0.07);  }

    .verdict-icon { font-size: 20px; line-height: 1; flex-shrink: 0; }
    .verdict-info { flex: 1; min-width: 0; }
    .verdict-label {
      font-family: var(--mono);
      font-size: 14px;
      font-weight: 600;
      letter-spacing: 0.05em;
    }
    .card.ok  .verdict-label { color: var(--accent); }
    .card.bad .verdict-label { color: var(--danger);  }
    .verdict-url {
      font-size: 10px;
      color: var(--muted2);
      font-family: var(--mono);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      margin-top: 2px;
    }
    .confidence {
      font-family: var(--mono);
      font-size: 20px;
      font-weight: 600;
      flex-shrink: 0;
    }
    .card.ok  .confidence { color: var(--accent); }
    .card.bad .confidence { color: var(--danger);  }

    /* ── LIME section ── */
    .lime-section {
      padding: 10px 14px 12px;
      background: var(--surface);
      border-top: 1px solid var(--border);
    }
    .lime-title {
      font-family: var(--mono);
      font-size: 9px;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 10px;
    }
    .feat-list { display: flex; flex-direction: column; gap: 7px; }

    .feat {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 4px 10px;
      align-items: center;
    }
    .feat-name {
      font-family: var(--mono);
      font-size: 10px;
      color: var(--text);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .feat-score {
      font-family: var(--mono);
      font-size: 10px;
      text-align: right;
      white-space: nowrap;
    }
    .feat-score.pos { color: var(--danger);  }
    .feat-score.neg { color: var(--accent);  }

    .feat-bar-bg {
      grid-column: 1 / -1;
      height: 3px;
      background: var(--border);
      border-radius: 2px;
      overflow: hidden;
    }
    .feat-bar-fill {
      height: 100%;
      border-radius: 2px;
      transition: width 0.5s cubic-bezier(.4,0,.2,1);
    }
    .feat-bar-fill.pos { background: var(--danger); }
    .feat-bar-fill.neg { background: var(--accent); }

    /* ── Footer ── */
    .footer {
      padding: 8px 16px;
      border-top: 1px solid var(--border);
      background: var(--surface);
      font-family: var(--mono);
      font-size: 9px;
      color: var(--muted);
      letter-spacing: 0.08em;
      display: flex;
      justify-content: space-between;
    }
  </style>
</head>
<body>

  <!-- Top bar -->
  <div class="topbar">
    <div class="brand">
      <svg class="shield" viewBox="0 0 26 26" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M13 2L4 6V13C4 17.97 8.02 22.57 13 24C17.98 22.57 22 17.97 22 13V6L13 2Z"
              fill="rgba(0,214,143,0.12)" stroke="#00d68f" stroke-width="1.2" stroke-linejoin="round"/>
        <path d="M9.5 13L12 15.5L16.5 11" stroke="#00d68f" stroke-width="1.4"
              stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
      <span class="brand-name">PHISH<span>GUARD</span></span>
    </div>
    <div class="status-dot" id="statusDot" title="API online"></div>
  </div>

  <!-- Body -->
  <div class="body">
    <div class="input-label">Target URL</div>
    <div class="input-row">
      <input
        id="urlInput"
        class="url-input"
        type="text"
        placeholder="https://example.com/page"
        autocomplete="off"
        spellcheck="false"
      />
      <button id="analyzeBtn" class="btn">SCAN</button>
    </div>

    <!-- Loader -->
    <div id="loader" class="loader">
      <span>Analyzing</span>
      <div class="bar-loader"><div class="bar-inner"></div></div>
    </div>

    <!-- Error -->
    <div id="errorBox" class="error"></div>

    <!-- Result card -->
    <div id="card" class="card">
      <div class="card-top">
        <span id="vIcon" class="verdict-icon"></span>
        <div class="verdict-info">
          <div id="vLabel" class="verdict-label"></div>
          <div id="vUrl"   class="verdict-url"></div>
        </div>
        <span id="vConf" class="confidence"></span>
      </div>
      <div class="lime-section">
        <div class="lime-title">Feature impact (LIME)</div>
        <div id="featList" class="feat-list"></div>
      </div>
    </div>
  </div>

  <!-- Footer -->
  <div class="footer">
    <span>LightGBM · LIME · v1.0</span>
    <span id="lastUrl">—</span>
  </div>

  <script src="popup.js"></script>
</body>
</html>
